{{define "modals/vpngateModal"}}
<a-modal id="vpngate-modal" v-model="vpngateModal.visible" title="VPNGate" :confirm-loading="vpngateModal.confirmLoading"
    :closable="true" :mask-closable="true" :footer="null" :class="themeSwitcher.currentTheme" width="1100px">
    
    <template v-if="vpngateModal.servers.length === 0">
        <a-button icon="api" @click="create()" :loading="vpngateModal.confirmLoading">{{ i18n "create" }}</a-button>
    </template>
    
    <template v-else>
        <!-- Top Toolbar & Current Connection Panel -->
        <div class="vpngate-top">
            <div class="vpngate-header-row" :style="{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }">
                <div class="vpngate-header-left">
                    <span :style="{ fontWeight: 600, fontSize: '15px' }">当前状态: </span>
                    <a-tag :color="statusColor">[[ statusName ]]</a-tag>
                    <a-radio-group v-model="vpngateModal.ruleMode" button-style="solid" size="small" @change="onRuleModeChanged" :style="{ marginLeft: '12px' }">
                        <a-radio-button value="default">自动连接</a-radio-button>
                        <a-radio-button value="fixed">国家连接</a-radio-button>
                        <a-radio-button value="favorite">收藏连接</a-radio-button>
                    </a-radio-group>
                </div>
                <div class="vpngate-header-right">
                    <span :style="{ marginRight: '8px', fontSize: '13px' }">失败自动重连</span>
                    <a-switch v-model="vpngateModal.fallbackEnable" @change="saveVPNGateSettings"></a-switch>
                    <a-button type="default" icon="setting" @click="openSettingsModal">规则设置</a-button>
                </div>
            </div>
            <div v-if="vpngateModal.ruleMode === 'fixed'" :style="{ marginBottom: '12px' }">
                <a-select
                    mode="multiple"
                    v-model="vpngateModal.selectedCountries"
                    :dropdown-class-name="themeSwitcher.currentTheme"
                    placeholder="选择要连接的国家/地区"
                    :style="{ width: '100%' }"
                    @change="onRuleModeChanged">
                    <a-select-option v-for="country in countryOptions" :key="country.value" :value="country.value">
                        <span class="vpngate-country">
                            <img class="vpngate-flag" :src="'https://flagcdn.com/24x18/' + country.value.toLowerCase() + '.png'" :alt="country.value">
                            [[ country.label ]]
                        </span>
                    </a-select-option>
                </a-select>
            </div>
            
            <div class="vpngate-panel vpngate-current">
                <div class="vpngate-panel-title">当前准备连接节点</div>
                <template v-if="displayServer">
                    <div class="vpngate-current-strip">
                        <div class="vpngate-current-main">
                            <small>IP</small>
                            <span class="vpngate-current-ip">[[ displayServer.ip ]]</span>
                        </div>
                        <div>
                            <small>国家</small>
                            <span class="vpngate-current-country">
                                <img class="vpngate-flag" :src="'https://flagcdn.com/24x18/' + displayServer.countryShortLower + '.png'" :alt="displayServer.countryShort">
                                [[ displayServer.countryLong ]]
                            </span>
                        </div>
                        <div>
                            <small>IP 属性</small>
                            <a-tag :color="displayServer.ipType === '住宅IP' ? 'green' : (displayServer.ipType === '机房IP' ? 'orange' : 'default')">
                                [[ displayServer.ipType ]]
                            </a-tag>
                        </div>
                        <div>
                            <small>运营商</small>
                            <span>[[ displayServer.isp ]]</span>
                        </div>
                        <div>
                            <small>ASN</small>
                            <span>[[ displayServer.asn ]]</span>
                        </div>
                        <div>
                            <small>延迟</small>
                            <span :class="pingClass(displayServer.localPing)">[[ displayServer.localPing < 0 ? '超时' : displayServer.localPing + ' ms' ]]</span>
                        </div>
                        <div>
                            <small>连接方式</small>
                            <span>[[ ruleName ]]</span>
                        </div>
                    </div>
                </template>
                <div v-else class="vpngate-current-empty">[[ emptySelectionHint ]]</div>
            </div>
            
            <!-- Connection Process Logger -->
            <div class="vpngate-panel" v-if="connectionActive">
                <div class="vpngate-panel-title">连接进度</div>
                <a-progress :percent="vpngateModal.connectStatus.progress || 0" :status="progressStatus"></a-progress>
                <div class="vpngate-status-line">
                    <span>[[ vpngateModal.connectStatus.message ]]</span>
                    <span v-if="vpngateModal.connectStatus.tunIP" class="vpngate-mono">[[ vpngateModal.connectStatus.tunDev ]] · [[ vpngateModal.connectStatus.tunIP ]]</span>
                </div>
                <div class="vpngate-status-line">
                    <span>候选 [[ candidateServers.length ]] 个</span>
                    <span v-if="backupServers.length">备选：[[ backupServers.map(server => server.countryShort + ' ' + server.ip).join(' / ') ]]</span>
                </div>
                <a-button v-if="canCancel" size="small" type="danger" icon="close" @click="cancelConnect">取消</a-button>
            </div>
        </div>

        <!-- Node List Table grouped by country using multiple tbodies to prevent browser rendering bug -->
        <div class="vpngate-table-wrap">
            <table class="vpngate-table">
                <thead>
                    <tr>
                        <th style="width: 60px; text-align: center;">收藏</th>
                        <th>国家</th>
                        <th>节点 IP</th>
                        <th>ASN</th>
                        <th>IP 类型</th>
                        <th>本地延迟</th>
                    </tr>
                </thead>
                <tbody v-for="group in groupedServers" :key="group.countryLong">
                    <!-- Country Collapse Toggle Header Row -->
                    <tr class="vpngate-country-header" @click="toggleCountryCollapse(group.countryLong)"
                        :title="group.countryLong + '，' + group.servers.length + ' 个节点'">
                        <td colspan="6">
                            <div class="vpngate-country-row">
                                <div class="vpngate-country-name">
                                    <a-icon :type="isCountryCollapsed(group.countryLong) ? 'right' : 'down'"></a-icon>
                                    <a-icon v-if="group.isFavorites" type="star" theme="filled" :style="{ color: '#fadb14' }"></a-icon>
                                    <img v-else class="vpngate-flag" :src="'https://flagcdn.com/24x18/' + group.countryShortLower + '.png'" :alt="group.countryShort">
                                    <span>[[ group.countryLong ]]</span>
                                </div>
                                <a-tag color="cyan">[[ group.servers.length ]] 个节点</a-tag>
                            </div>
                        </td>
                    </tr>
                    <!-- Country Nodes List Rows (Only visible when unfolded) -->
                    <template v-if="!isCountryCollapsed(group.countryLong)">
                        <tr v-for="server in group.servers" :key="group.countryLong + server.hostName + server.ip" :style="{ opacity: server.localPing < 0 ? 0.45 : 1 }">
                            <td style="text-align: center;">
                                <a-icon type="star" :theme="isFavorited(server) ? 'filled' : 'outlined'"
                                    :style="{ cursor: 'pointer', color: isFavorited(server) ? '#fadb14' : 'rgba(255, 255, 255, 0.4)', fontSize: '16px' }"
                                    @click.stop="toggleFavorite(server)"></a-icon>
                            </td>
                            <td>
                                <span class="vpngate-country">
                                    <img class="vpngate-flag" :src="'https://flagcdn.com/24x18/' + server.countryShortLower + '.png'" :alt="server.countryShort">
                                    [[ server.countryLong ]]
                                </span>
                            </td>
                            <td class="vpngate-mono">[[ server.ip ]]</td>
                            <td class="vpngate-mono">[[ server.asn ]]</td>
                            <td>
                                <a-tag :color="server.ipType === '住宅IP' ? 'green' : (server.ipType === '机房IP' ? 'orange' : 'default')">
                                        [[ server.ipType ]]
                                </a-tag>
                            </td>
                            <td>
                                <span :class="pingClass(server.localPing)">
                                        [[ server.localPing < 0 ? '超时' : server.localPing + ' ms' ]]
                                </span>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- Footer actions -->
        <div class="vpngate-footer">
            <a-tag color="green">[[ vpngateModal.servers.length ]] 个可用节点</a-tag>
            <div class="vpngate-footer-actions">
                <a-button icon="sync" @click="create(true)" :loading="vpngateModal.confirmLoading">刷新</a-button>
                <a-switch v-model="vpngateModal.showUnavailable" checked-children="显示不可用" un-checked-children="隐藏不可用" @change="create(true)"></a-switch>
                <a-button type="danger" icon="delete" @click="uninstallVPNGate" :loading="vpngateModal.confirmLoading">卸载</a-button>
                <a-button v-if="isConnected" type="danger" icon="disconnect" @click="disconnectVPNGate">断开</a-button>
                <a-button v-else type="primary" icon="api" @click="addOutbound" :loading="connectBusy" :disabled="!bestServer || connectBusy"
                    :title="addOutboundDisabledReason">连接</a-button>
            </div>
        </div>
    </template>

    <!-- Secondary Modal: Rules and grab period settings -->
    <a-modal id="vpngate-settings-modal" v-model="vpngateModal.settingsVisible" title="VPNGate 规则与设置"
        :closable="true" :mask-closable="true" :footer="null" :class="themeSwitcher.currentTheme" width="600px">
        <div class="vpngate-settings-wrap" :style="{ padding: '10px 0' }">
            <a-form layout="vertical">
                <a-form-item label="节点自动刷新周期 (分钟)">
                    <div class="vpngate-refresh-control">
                        <a-slider
                            v-model="vpngateModal.refreshInterval"
                            :min="15"
                            :max="4320"
                            :marks="refreshIntervalMarks"
                            :tip-formatter="formatRefreshInterval"></a-slider>
                        <a-input-number v-model="vpngateModal.refreshInterval" :min="15" :max="4320"></a-input-number>
                    </div>
                </a-form-item>

                <a-form-item label="连接方式">
                    <a-radio-group v-model="vpngateModal.ruleMode" button-style="solid" :style="{ width: '100%' }">
                        <a-radio-button value="default" :style="{ width: '33.3%', textAlign: 'center' }">自动连接</a-radio-button>
                        <a-radio-button value="fixed" :style="{ width: '33.3%', textAlign: 'center' }">国家连接</a-radio-button>
                        <a-radio-button value="favorite" :style="{ width: '33.4%', textAlign: 'center' }">收藏连接</a-radio-button>
                    </a-radio-group>
                    <div :style="{ marginTop: '8px', color: 'rgba(255, 255, 255, 0.45)', fontSize: '13px', lineHeight: '1.4' }">
                        <span v-if="vpngateModal.ruleMode === 'default'"><b>自动连接</b>: 从全部可用节点里选择延迟最低的节点。</span>
                        <span v-if="vpngateModal.ruleMode === 'fixed'"><b>国家连接</b>: 只在所选国家/地区内连接。</span>
                        <span v-if="vpngateModal.ruleMode === 'favorite'"><b>收藏连接</b>: 只连接已收藏的星标节点。</span>
                    </div>
                </a-form-item>

                <a-form-item v-if="vpngateModal.ruleMode === 'fixed'" label="选择国家/地区">
                    <a-select
                        mode="multiple"
                        v-model="vpngateModal.selectedCountries"
                        :dropdown-class-name="themeSwitcher.currentTheme"
                        placeholder="选择允许连接的国家">
                        <a-select-option v-for="country in countryOptions" :key="country.value" :value="country.value">
                            <span class="vpngate-country">
                                <img class="vpngate-flag" :src="'https://flagcdn.com/24x18/' + country.value.toLowerCase() + '.png'" :alt="country.value">
                                [[ country.label ]]
                            </span>
                        </a-select-option>
                    </a-select>
                </a-form-item>

                <a-form-item :style="{ textAlign: 'right', marginTop: '24px', marginBottom: 0 }">
                    <a-button @click="vpngateModal.settingsVisible = false" :style="{ marginRight: '8px' }">取消</a-button>
                    <a-button type="primary" @click="saveVPNGateSettings">保存设置</a-button>
                </a-form-item>
            </a-form>
        </div>
    </a-modal>
</a-modal>

<script>
    const vpngateModal = {
        visible: false,
        confirmLoading: false,
        servers: [],
        ruleMode: 'default',
        selectedCountries: [],
        favorites: [],
        refreshInterval: 120,
        fallbackEnable: true,
        showUnavailable: false,
        settingsVisible: false,
        collapsedCountries: {},
        connectStatus: {
            phase: 'idle',
            progress: 0,
            message: '',
        },
        statusTimer: null,
        app: null,
        show() {
            this.visible = true;
            if (this.app) {
                this.app.initModal();
            }
        },
        close() {
            this.visible = false;
            if (this.app) {
                this.app.stopStatusTimer();
            }
        },
        loading(loading = true) {
            this.confirmLoading = loading;
        },
    };

    new Vue({
        delimiters: ['[[', ']]'],
        el: '#vpngate-modal',
        data: {
            vpngateModal: vpngateModal,
        },
        created() {
            vpngateModal.app = this;
        },
        computed: {
            countryOptions() {
                const countries = new Map();
                vpngateModal.servers.forEach(server => {
                    if (!server.countryShort) return;
                    countries.set(server.countryShort, {
                        value: server.countryShort,
                        label: `${server.countryLong} (${server.countryShort})`,
                    });
                });
                return Array.from(countries.values()).sort((a, b) => a.label.localeCompare(b.label));
            },
            selectedCountryLabels() {
                const names = new Map(this.countryOptions.map(country => [country.value, country.label]));
                return vpngateModal.selectedCountries.map(code => names.get(code) || code).join(', ');
            },
            selectedServers() {
                if (vpngateModal.ruleMode === 'default') {
                    return vpngateModal.servers.filter(server => server.localPing >= 0);
                }
                if (vpngateModal.ruleMode === 'favorite') {
                    if (vpngateModal.favorites.length === 0) {
                        return [];
                    }
                    return vpngateModal.servers.filter(server => this.isFavorited(server) && server.localPing >= 0);
                }
                if (vpngateModal.selectedCountries.length === 0) {
                    return [];
                }
                return vpngateModal.servers.filter(server => vpngateModal.selectedCountries.includes(server.countryShort) && server.localPing >= 0);
            },
            candidateServers() {
                return this.selectedServers;
            },
            backupServers() {
                const currentIP = (vpngateModal.connectStatus.server && vpngateModal.connectStatus.server.ip) || (this.bestServer && this.bestServer.ip);
                return this.candidateServers.filter(server => server.ip !== currentIP).slice(0, 3);
            },
            bestServer() {
                const pool = this.selectedServers.length > 0 ? this.selectedServers : [];
                return pool.slice().sort((a, b) => this.pingRank(a.localPing) - this.pingRank(b.localPing))[0] || null;
            },
            displayServer() {
                return vpngateModal.connectStatus.server || this.bestServer;
            },
            emptySelectionHint() {
                if (vpngateModal.ruleMode === 'fixed' && vpngateModal.selectedCountries.length === 0) {
                    return '国家连接需要先选择国家/地区';
                }
                if (vpngateModal.ruleMode === 'favorite' && vpngateModal.favorites.length === 0) {
                    return '收藏连接需要先星标至少一个节点';
                }
                return '当前连接方式没有可用节点';
            },
            addOutboundDisabledReason() {
                if (this.connectBusy) return 'VPNGate 正在连接中';
                if (!this.bestServer) return this.emptySelectionHint;
                return '';
            },
            ruleHint() {
                if (vpngateModal.ruleMode === 'fixed') return '只连接所选国家';
                if (vpngateModal.ruleMode === 'favorite') return '只连接已收藏的节点';
                return '';
            },
            ruleName() {
                return {
                    default: '自动连接',
                    fixed: '国家连接',
                    favorite: '收藏连接',
                }[vpngateModal.ruleMode];
            },
            statusName() {
                return {
                    idle: '未连接',
                    installing: '连接中',
                    preparing: '连接中',
                    connecting: '连接中',
                    connected: '已连接',
                    waiting_confirm: '等待确认',
                    failed: '连接失败',
                    canceled: '已断开',
                }[vpngateModal.connectStatus.phase] || '未连接';
            },
            statusColor() {
                return {
                    connected: 'green',
                    connecting: 'blue',
                    installing: 'blue',
                    preparing: 'blue',
                    waiting_confirm: 'orange',
                    failed: 'red',
                    canceled: 'default',
                    idle: 'default',
                }[vpngateModal.connectStatus.phase] || 'default';
            },
            isConnected() {
                return vpngateModal.connectStatus.phase === 'connected';
            },
            connectionActive() {
                return ['installing', 'preparing', 'connecting', 'waiting_confirm', 'failed'].includes(vpngateModal.connectStatus.phase);
            },
            connectBusy() {
                return ['installing', 'preparing', 'connecting'].includes(vpngateModal.connectStatus.phase);
            },
            canCancel() {
                return this.connectBusy || vpngateModal.connectStatus.phase === 'waiting_confirm';
            },
            progressStatus() {
                if (vpngateModal.connectStatus.phase === 'failed') return 'exception';
                if (vpngateModal.connectStatus.phase === 'connected') return 'success';
                if (vpngateModal.connectStatus.phase === 'waiting_confirm') return 'normal';
                return 'active';
            },
            refreshIntervalMarks() {
                return {
                    15: '15',
                    1440: '1天',
                    4320: '3天',
                };
            },
            groupedServers() {
                const groups = {};
                vpngateModal.servers.forEach(server => {
                    const country = server.countryLong;
                    if (!groups[country]) {
                        groups[country] = {
                            countryLong: server.countryLong,
                            countryShort: server.countryShort,
                            countryShortLower: server.countryShortLower,
                            servers: [],
                        };
                    }
                    groups[country].servers.push(server);
                });
                
                const result = Object.values(groups);
                const favorites = vpngateModal.servers.filter(server => this.isFavorited(server));
                if (favorites.length > 0) {
                    result.unshift({
                        countryLong: '我的收藏',
                        countryShort: '',
                        countryShortLower: '',
                        isFavorites: true,
                        servers: favorites,
                    });
                }
                result.forEach(group => {
                    group.servers.sort((a, b) => {
                        const pa = a.localPing < 0 ? 999999 : a.localPing;
                        const pb = b.localPing < 0 ? 999999 : b.localPing;
                        return pa - pb;
                    });
                    const firstServer = group.servers[0];
                    group.bestPing = this.pingRank(firstServer ? firstServer.localPing : -1);
                    group.priority = this.countryPriority(group);
                });
                return result.sort((a, b) => {
                    if (a.isFavorites) return -1;
                    if (b.isFavorites) return 1;
                    return (a.priority - b.priority) || (a.bestPing - b.bestPing);
                });
            },
        },
        methods: {
            async create(refresh = false) {
                vpngateModal.loading(true);
                const msg = await HttpUtil.post('/panel/xray/vpngate/list', {
                    refresh: refresh ? 'true' : '',
                    showUnavailable: vpngateModal.showUnavailable ? 'true' : '',
                });
                vpngateModal.loading(false);
                if (msg.success) {
                    vpngateModal.servers = msg.obj || [];
                    this.resetCollapsedCountries();
                }
            },
            pingClass(ping) {
                if (ping < 0) return 'vpngate-ping-slow';
                if (ping < 50) return 'vpngate-ping-fast';
                if (ping < 150) return 'vpngate-ping-medium';
                return 'vpngate-ping-slow';
            },
            pingRank(ping) {
                return ping < 0 ? Number.MAX_SAFE_INTEGER : ping;
            },
            countryPriority(group) {
                if (vpngateModal.ruleMode === 'fixed') {
                    return vpngateModal.selectedCountries.includes(group.countryShort) ? 0 : 1;
                }
                if (vpngateModal.ruleMode === 'favorite') {
                    return group.servers.some(server => this.isFavorited(server)) ? 0 : 1;
                }
                return 0;
            },
            formatRefreshInterval(value) {
                return value + ' 分钟';
            },
            resetCollapsedCountries() {
                const openCountries = new Set();
                if (vpngateModal.ruleMode === 'fixed') {
                    vpngateModal.servers.forEach(server => {
                        if (vpngateModal.selectedCountries.includes(server.countryShort)) {
                            openCountries.add(server.countryLong);
                        }
                    });
                } else if (vpngateModal.ruleMode === 'favorite') {
                    vpngateModal.servers.forEach(server => {
                        if (this.isFavorited(server)) {
                            openCountries.add(server.countryLong);
                        }
                    });
                }
                if (openCountries.size === 0 && this.bestServer) {
                    openCountries.add(this.bestServer.countryLong);
                }
                const collMap = {};
                vpngateModal.servers.forEach(server => {
                    collMap[server.countryLong] = openCountries.size > 0 ? !openCountries.has(server.countryLong) : false;
                });
                vpngateModal.collapsedCountries = collMap;
            },
            setConnectStatus(status) {
                vpngateModal.connectStatus = status || { phase: 'idle', progress: 0, message: '' };
            },
            startStatusTimer() {
                if (!vpngateModal.statusTimer) {
                    vpngateModal.statusTimer = setInterval(() => this.refreshConnectStatus(), 1200);
                }
            },
            stopStatusTimer() {
                if (vpngateModal.statusTimer) {
                    clearInterval(vpngateModal.statusTimer);
                    vpngateModal.statusTimer = null;
                }
            },
            async initModal() {
                await this.loadVPNGateSettings();
                this.create();
                this.refreshConnectStatus();
            },
            async refreshConnectStatus() {
                const msg = await HttpUtil.post('/panel/xray/vpngate/status');
                if (!msg.success) return;
                const oldPhase = vpngateModal.connectStatus.phase;
                this.setConnectStatus(msg.obj);
                if (msg.obj.phase === 'connected') {
                    if (oldPhase !== 'connected') {
                        this.upsertVPNGateOutbound(msg.obj.outbound);
                        if (window.vpngateLoadingMsg) {
                            window.vpngateLoadingMsg(); // dismiss loading toast
                            window.vpngateLoadingMsg = null;
                        }
                        Vue.prototype.$message.success('VPNGate 连接成功，已生成并应用 vpngate 出站');
                        if (['installing', 'preparing', 'connecting'].includes(oldPhase)) {
                            vpngateModal.close();
                        }
                    }
                    vpngateModal.loading(false);
                    this.stopStatusTimer();
                } else if (msg.obj.phase === 'waiting_confirm') {
                    this.stopStatusTimer();
                    if (window.vpngateLoadingMsg) {
                        window.vpngateLoadingMsg();
                        window.vpngateLoadingMsg = null;
                    }
                    if (oldPhase !== 'waiting_confirm') {
                        this.confirmUseAllNodes();
                    }
                    vpngateModal.loading(false);
                } else if (['failed', 'canceled', 'idle'].includes(msg.obj.phase)) {
                    this.stopStatusTimer();
                    if (window.vpngateLoadingMsg) {
                        window.vpngateLoadingMsg(); // dismiss loading toast
                        window.vpngateLoadingMsg = null;
                    }
                    if (msg.obj.phase === 'failed') {
                        Vue.prototype.$message.error('VPNGate 连接失败: ' + msg.obj.message);
                    }
                    vpngateModal.loading(false);
                } else if (['installing', 'preparing', 'connecting'].includes(msg.obj.phase)) {
                    this.startStatusTimer();
                }
            },
            async addOutbound() {
                if (!this.bestServer) return;
                
                const h = this.$createElement;

                this.$confirm({
                    title: '确认连接 VPNGate 吗？',
                    content: h('div', { class: 'vpngate-confirm' }, [
                        h('div', { class: 'vpngate-confirm-title' }, '当前连接方式'),
                        h('div', { class: 'vpngate-confirm-row' }, [
                            h('span', '方式'),
                            h('b', this.ruleName),
                        ]),
                        h('div', { class: 'vpngate-confirm-row' }, [
                            h('span', '失败自动重连'),
                            h('b', vpngateModal.fallbackEnable ? '开' : '关'),
                        ]),
                    ]),
                    okText: '确定',
                    cancelText: '取消',
                    class: themeSwitcher.currentTheme,
                    onOk: async () => {
                        if (window.vpngateLoadingMsg) {
                            window.vpngateLoadingMsg();
                        }
                        
                        const msg = await HttpUtil.post('/panel/xray/vpngate/start', {
                            server: JSON.stringify(this.bestServer),
                            ruleMode: vpngateModal.ruleMode,
                            selectedCountries: JSON.stringify(vpngateModal.selectedCountries),
                            fallbackEnable: vpngateModal.fallbackEnable,
                        });
                        if (msg.success) {
                            this.setConnectStatus(msg.obj);
                            this.startStatusTimer();
                        } else {
                            if (window.vpngateLoadingMsg) {
                                window.vpngateLoadingMsg();
                                window.vpngateLoadingMsg = null;
                            }
                            Vue.prototype.$message.error('VPNGate 启动连接请求失败');
                        }
                    }
                });
            },
            confirmUseAllNodes() {
                this.$confirm({
                    title: '当前范围内的节点都不可用',
                    content: '是否临时使用全部节点继续连接？本次连接成功后仍会显示实际连接的国家和 IP。',
                    okText: '继续连接',
                    cancelText: '停止',
                    class: themeSwitcher.currentTheme,
                    onOk: async () => {
                        window.vpngateLoadingMsg = Vue.prototype.$message.loading('VPNGate 正在临时使用全部节点继续连接...', 0);
                        const msg = await HttpUtil.post('/panel/xray/vpngate/continue');
                        if (msg.success) {
                            this.setConnectStatus(msg.obj);
                            this.startStatusTimer();
                        } else {
                            if (window.vpngateLoadingMsg) {
                                window.vpngateLoadingMsg();
                                window.vpngateLoadingMsg = null;
                            }
                            Vue.prototype.$message.error('继续连接失败');
                        }
                    },
                    onCancel: () => this.cancelConnect(),
                });
            },
            async cancelConnect() {
                const msg = await HttpUtil.post('/panel/xray/vpngate/cancel');
                if (msg.success) {
                    this.setConnectStatus(msg.obj);
                    this.stopStatusTimer();
                }
                vpngateModal.loading(false);
            },
            async disconnectVPNGate() {
                const msg = await HttpUtil.post('/panel/xray/vpngate/stop');
                if (msg.success) {
                    this.setConnectStatus(msg.obj);
                    Vue.prototype.$message.success('VPNGate 已断开');
                }
            },
            async uninstallVPNGate() {
                this.$confirm({
                    title: '确认要卸载 VPNGate 吗？',
                    content: '该操作将断开当前 VPN 连接、完全卸载 OpenVPN 包并清空所有节点缓存。',
                    okText: '确定',
                    okType: 'danger',
                    cancelText: '取消',
                    class: themeSwitcher.currentTheme,
                    onOk: async () => {
                        vpngateModal.loading(true);
                        const msg = await HttpUtil.post('/panel/xray/vpngate/uninstall');
                        vpngateModal.loading(false);
                        if (msg.success) {
                            Vue.prototype.$message.success('VPNGate 卸载清理完成');
                            this.removeVPNGateOutbound();
                            vpngateModal.servers = [];
                            vpngateModal.close();
                        } else {
                            Vue.prototype.$message.error('卸载失败');
                        }
                    }
                });
            },
            removeVPNGateOutbound() {
                if (!app.templateSettings) return;
                const outbounds = app.templateSettings.outbounds || [];
                const index = outbounds.findIndex(o => o.tag === 'vpngate');
                if (index >= 0) {
                    outbounds.splice(index, 1);
                    app.templateSettings.outbounds = outbounds;
                    app.outboundSettings = JSON.stringify(outbounds);
                    app.refreshOutboundTraffic();
                }
            },
            upsertVPNGateOutbound(outbound) {
                if (!outbound || !app.templateSettings) return;
                const outbounds = app.templateSettings.outbounds || [];
                const index = outbounds.findIndex(o => o.tag === outbound.tag);
                if (index >= 0) {
                    outbounds[index] = outbound;
                } else {
                    outbounds.push(outbound);
                }
                app.templateSettings.outbounds = outbounds;
                app.outboundSettings = JSON.stringify(outbounds);
                app.refreshOutboundTraffic();
            },
            // Settings sub-modal triggers
            openSettingsModal() {
                vpngateModal.settingsVisible = true;
            },
            onRuleModeChanged() {
                this.resetCollapsedCountries();
                this.saveVPNGateSettings();
            },
            async loadVPNGateSettings() {
                const msg = await HttpUtil.post('/panel/xray/vpngate/get_settings');
                if (msg.success && msg.obj) {
                    vpngateModal.favorites = msg.obj.favorites || [];
                    vpngateModal.refreshInterval = msg.obj.refreshInterval || 120;
                    vpngateModal.ruleMode = msg.obj.ruleMode || 'default';
                    vpngateModal.selectedCountries = msg.obj.selectedCountries || [];
                    vpngateModal.fallbackEnable = msg.obj.fallbackEnable !== false;
                }
            },
            settingsPayload() {
                return {
                    refreshInterval: vpngateModal.refreshInterval,
                    favorites: JSON.stringify(vpngateModal.favorites),
                    ruleMode: vpngateModal.ruleMode,
                    selectedCountries: JSON.stringify(vpngateModal.selectedCountries),
                    fallbackEnable: vpngateModal.fallbackEnable,
                };
            },
            async saveVPNGateSettings() {
                vpngateModal.loading(true);
                const msg = await HttpUtil.post('/panel/xray/vpngate/save_settings', this.settingsPayload());
                vpngateModal.loading(false);
                if (msg.success) {
                    Vue.prototype.$message.success('规则配置保存成功');
                    vpngateModal.settingsVisible = false;
                    this.resetCollapsedCountries();
                } else {
                    Vue.prototype.$message.error('保存设置失败');
                }
            },
            // Star favorites helper
            isFavorited(server) {
                return vpngateModal.favorites.includes(server.hostName);
            },
            async toggleFavorite(server) {
                const idx = vpngateModal.favorites.indexOf(server.hostName);
                if (idx >= 0) {
                    vpngateModal.favorites.splice(idx, 1);
                } else {
                    vpngateModal.favorites.push(server.hostName);
                }
                // Save immediately to settings database
                const msg = await HttpUtil.post('/panel/xray/vpngate/save_settings', this.settingsPayload());
                if (!msg.success) {
                    Vue.prototype.$message.error('收藏同步失败');
                    if (idx >= 0) {
                        vpngateModal.favorites.splice(idx, 0, server.hostName);
                    } else {
                        vpngateModal.favorites = vpngateModal.favorites.filter(host => host !== server.hostName);
                    }
                }
            },
            // Accordion fold toggles
            toggleCountryCollapse(country) {
                this.$set(vpngateModal.collapsedCountries, country, !vpngateModal.collapsedCountries[country]);
            },
            isCountryCollapsed(country) {
                return !!vpngateModal.collapsedCountries[country];
            },
        },
    });
</script>
{{end}}
